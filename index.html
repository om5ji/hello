<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Download | Official Release</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .download-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .icon {
            font-size: 50px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(88, 166, 255, 0.4);
        }
        h2 {
            color: #ffffff;
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            font-weight: 600;
        }
        .meta-info {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        .primary-badge {
            display: inline-block;
            background-color: rgba(35, 134, 54, 0.15);
            color: #3fb950;
            border: 1px solid #2ea043;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }
        .status-text {
            color: #e3b341; /* पीला रंग ताकि यूज़र का ध्यान जाए */
            font-size: 0.95rem;
            margin-top: 25px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="download-card">
        <div class="icon">🛡️</div>
        <h2>Remote Tech Tool</h2>
        <div class="meta-info">Version 1.0.2 &bull; Auto-Detecting Device...</div>
        
        <div class="primary-badge">✓ 100% Safe & Verified</div>
        
        <p class="status-text" id="download-status">Checking your device...</p>
    </div>

    <script>
        function startSmartDownload() {
            // यूज़र के ब्राउज़र की जानकारी निकालना
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var statusElement = document.getElementById("download-status");

            // 1. अगर डिवाइस Android है
            if (/android/i.test(userAgent)) {
                statusElement.innerHTML = "Android detected! Starting .apk download...";
                statusElement.style.color = "#3fb950"; // हरा रंग
                window.location.href = "dummy_app.apk"; // यहाँ Android ऐप का लिंक होगा
            } 
            // 2. अगर डिवाइस iPhone/iPad (iOS) है
            else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                statusElement.innerHTML = "iOS detected! Redirecting to App Store...";
                statusElement.style.color = "#58a6ff"; // नीला रंग
                // अभी के लिए alert लगा है, बाद में इसे App store के लिंक से बदल देंगे
                setTimeout(function() {
                    alert("Since you are on iPhone, you will be redirected to the Apple App Store.");
                    // window.location.href = "https://apps.apple.com/in/app/your-app-link";
                }, 1000);
            } 
            // 3. अगर कंप्यूटर (Windows/Linux/Mac) है
            else {
                statusElement.innerHTML = "Desktop detected! Starting .exe download...";
                statusElement.style.color = "#3fb950"; 
                window.location.href = "dummy_app.exe"; // यहाँ डेस्कटॉप ऐप का लिंक होगा
            }
        }

        // पेज खुलने के 2 सेकंड बाद यह दिमाग अपना काम शुरू कर देगा
        setTimeout(startSmartDownload, 2000);
    </script>

</body>
</html>
